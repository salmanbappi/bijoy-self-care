name: Release Bijoy Self Care (Stable)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk

    - name: Notify Telegram (Success)
      if: success()
      run: |
        APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
        MESSAGE="✅ *Stable Release Success* for \`Bijoy Self Care\`
        Commit: \`${{ github.event.head_commit.message }}\`
        Tag/Ref: \`${{ github.ref_name }}\`
        [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        
        # Send message
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=markdown"
          
        # Send APK
        curl -v -F document=@"$APK_PATH" \
          -F "chat_id=${{ secrets.TELEGRAM_TO }}" \
          -F "caption=Bijoy Self Care Stable Release APK (R8 Extreme)" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument"

    - name: Notify Telegram (Failure)
      if: failure()
      run: |
        MESSAGE="❌ *Stable Release Failed* for \`Bijoy Self Care\`
        Commit: \`${{ github.event.head_commit.message }}\`
        Tag/Ref: \`${{ github.ref_name }}\`
        [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=markdown"
